name: Create GitHub Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: create-github-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: main

      - name: Detect release PR
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha;

            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: sha,
            });

            const releasePattern = /^release:\s+v([0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?)$/;
            const releasePr = prs.data.find((pr) => {
              const title = pr.title || "";
              const branch = pr.head?.ref || "";
              return releasePattern.test(title) || /^release\/v[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?$/.test(branch);
            });

            if (!releasePr) {
              core.setOutput("is_release", "false");
              return;
            }

            const titleMatch = (releasePr.title || "").match(releasePattern);
            const branchMatch = (releasePr.head?.ref || "").match(/^release\/v([0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?)$/);
            const version = titleMatch?.[1] || branchMatch?.[1];
            if (!version) {
              core.setFailed(`Could not parse release version from PR #${releasePr.number}`);
              return;
            }

            let body = (releasePr.body || "").trim();

            const notesMatch = body.match(/##\s*Release notes\s*([\s\S]*)/i);
            if (notesMatch) body = notesMatch[1].trim();

            body = body.replace(/[ \t]+$/gm, "").trim();

            core.setOutput("is_release", "true");
            core.setOutput("version", version);
            core.setOutput("is_prerelease", version.includes("-") ? "true" : "false");
            core.setOutput("body", body);

      - name: Stop if not a release commit
        if: steps.detect.outputs.is_release != 'true'
        run: echo "Not a release commit. Skip."

      - name: Set tag name
        if: steps.detect.outputs.is_release == 'true'
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${{ steps.detect.outputs.version }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        if: steps.detect.outputs.is_release == 'true'
        id: tag_exists
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.detect.outputs.is_release == 'true' && steps.tag_exists.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.detect.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: ${{ steps.detect.outputs.body }}
          draft: false
          prerelease: ${{ steps.detect.outputs.is_prerelease == 'true' }}
          make_latest: ${{ steps.detect.outputs.is_prerelease == 'true' && 'false' || 'legacy' }}
