  linkedin_username:
  instagram_id: # Your Instagram username.
  orcid_id: # Your ORCID iD.
  telegram_username: # Your Telegram username. https://t.me/username
  bluesky_username: # Your Bluesky username (without prefix). https://bsky.app/profile/{username}
  youtube_id: # Your YouTube channel ID. https://www.youtube.com/@username
  zhihu_username: # Your Zhihu username. https://www.zhihu.com/people/username
  bilibili_id: # Your Bilibili ID. https://space.bilibili.com/username
  email: # Your email address.
  rss: false # Display the RSS icon. Set to false to hide the icon. Set empty to fully disable the RSS feed.

# ######################
# COMMENTS SETTINGS
# Only one of the following two options should be enabled.
