<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="替身的小本子 logo">
  <title>Tishen Notebook</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a2f5b"/>
      <stop offset="55%" stop-color="#5a3a7a"/>
      <stop offset="100%" stop-color="#1f1633"/>
    </linearGradient>
    <linearGradient id="bell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd9a3"/>
      <stop offset="60%" stop-color="#ffb070"/>
      <stop offset="100%" stop-color="#cf7a3a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#ffe6c4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffe6c4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background plate with rounded corners -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#glow)"/>

  <!-- subtle dotted ring (notebook spine vibe) -->
  <g opacity="0.18" stroke="#ffe6c4" stroke-width="2" fill="none" stroke-dasharray="2 8">
    <circle cx="256" cy="256" r="200"/>
  </g>

  <!-- bell body -->
  <g transform="translate(256 256)">
    <!-- top ribbon ring -->
    <rect x="-14" y="-178" width="28" height="34" rx="10" fill="#ffe6c4" opacity="0.85"/>
    <!-- bell -->
    <path d="
      M 0 -160
      C  90 -160  140  -90  140   -10
      L  140    50
      C  140    72  130    90  108    96
      L -108    96
      C -130    90 -140    72 -140    50
      L -140   -10
      C -140   -90  -90 -160   0  -160
      Z" fill="url(#bell)" stroke="#7a3f12" stroke-width="4"/>
    <!-- bell inner shading -->
    <path d="M -90 -110 C -40 -150  40 -150  90 -110" fill="none" stroke="#ffeacf" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
    <!-- bell mouth slit -->
    <rect x="-100" y="92" width="200" height="14" rx="6" fill="#3a1d05" opacity="0.55"/>
    <!-- clapper -->
    <circle cx="0" cy="128" r="22" fill="#ffd9a3" stroke="#7a3f12" stroke-width="4"/>

    <!-- 替 character glyph, simplified 篆书感 stroke -->
    <g fill="#3a1d05" font-family="'Noto Serif CJK SC','Noto Serif SC','Songti SC','Source Han Serif SC',serif" font-weight="700" text-anchor="middle">
      <text x="0" y="14" font-size="120" letter-spacing="0">替</text>
    </g>
  </g>

  <!-- tiny sparkle accents -->
  <g fill="#ffe6c4" opacity="0.85">
    <circle cx="92" cy="118" r="4"/>
    <circle cx="118" cy="92" r="2.5"/>
    <circle cx="420" cy="142" r="3"/>
    <circle cx="396" cy="116" r="2"/>
    <circle cx="408" cy="402" r="3"/>
    <circle cx="104" cy="392" r="2.5"/>
  </g>
</svg>
